<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DEMN — Gründerstart</title>

  <style>
    body { font-family: monospace; background:#000; color:#0f0; }
    button { margin: 1rem 0; padding:0.5rem 1rem; }
    pre { border:1px solid #0f0; padding:1rem; }
  </style>
</head>

<body>

<h1>DEMN — SYSTEM START</h1>
<button id="run">RUN DEMN</button>

<h2>OUTPUT</h2>
<pre id="out"></pre>

<script type="module">
  import { DEMN } from "./DEMN.js";

  document.getElementById("run").addEventListener("click", () => {
    const block = DEMN();
    console.log("DEMN:", block);

    document.getElementById("out").textContent =
      JSON.stringify(block, null, 2);
  });
</script>

</body>
</html>
